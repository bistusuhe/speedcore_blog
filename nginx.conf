# speedcore博客 - Nginx 反向代理配置
# 适配阿里云 Linux / 任何带 Docker 的 Linux 主机
# 部署说明：
#   1. 将 SSL 证书放置在 ./certs/ 目录下（fullchain.pem / privkey.pem）
#   2. 修改 server_name 为你的真实域名
#   3. docker compose up -d 即可

# 限流区：每个 IP 10 req/s
limit_req_zone $binary_remote_addr zone=suhe_limit:10m rate=10r/s;

# Gzip 压缩
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  application/xml+rss
  application/atom+xml
  image/svg+xml
  font/woff
  font/woff2;

# 上游：Next.js standalone 服务
upstream suhe_nextjs {
  server blog:3000;
  keepalive 32;
}

# HTTP -> HTTPS 跳转
server {
  listen 80;
  server_name suhe.dev www.suhe.dev;

  # ACME challenge 留在 80 端口（Let's Encrypt / certbot）
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS 主服务
server {
  listen 443 ssl;
  http2 on;
  server_name suhe.dev www.suhe.dev;

  # === SSL 证书（按需修改路径） ===
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # 安全响应头
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # 请求体上限（联系表单）
  client_max_body_size 10m;

  # 限流
  limit_req zone=suhe_limit burst=20 nodelay;

  # === 静态资源：Next.js _next/static 永久缓存 ===
  location /_next/static/ {
    proxy_pass http://suhe_nextjs;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_cache_valid 200 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
  }

  # === 公共静态资源 ===
  location ~ ^/(images|avatar|logo|music|robots.txt|favicon.ico|icon.svg)$ {
    proxy_pass http://suhe_nextjs;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    access_log off;
  }

  # === RSS / Sitemap：短缓存（每次拉取最新） ===
  location ~ ^/(rss.xml|sitemap.xml)$ {
    proxy_pass http://suhe_nextjs;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    add_header Cache-Control "public, max-age=3600" always;
    access_log off;
  }

  # === 主应用 ===
  location / {
    proxy_pass http://suhe_nextjs;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Next.js streaming / SSE 支持
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # 隐藏 . 开头的隐藏文件
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
